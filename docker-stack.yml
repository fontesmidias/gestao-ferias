version: '3.8'

# ==============================================================================
# AMBIENTE: PRODUÇÃO / VPS (O TANQUE DE GUERRA)
# Finalidade: Implantação em Nuvem via Docker Swarm & Portainer.
# Como usar: docker stack deploy -c docker-stack.yml gestao-ferias
# ==============================================================================

services:
  database:
    image: postgres:15-alpine
    environment:
      # Aspas duplas adicionadas para evitar que o YAML confunda os dois pontos ':' da mensagem com uma chave aninhada.
      POSTGRES_USER: "${DB_USER:?Erro: DB_USER nao definido}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Erro: DB_PASSWORD nao definido}"
      POSTGRES_DB: "${DB_NAME:-gestaoferias}"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - ferias_backend_network
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 1G

  cache:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    networks:
      - ferias_backend_network
    deploy:
      replicas: 1 # Ajustado para apenas 1 réplica
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 1G

  api:
    image: ghcr.io/fontesmidias/gestao-ferias-backend:latest
    environment:
      NODE_ENV: "production"
      PORT: "2000"
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME:-gestaoferias}?schema=public"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
      JWT_SECRET: "${JWT_SECRET:?Erro: JWT_SECRET obrigatorio em producao}"
    networks:
      - ferias_backend_network
      - ferias_traefik_public
    deploy:
      replicas: 1 # Ajustado para apenas 1 réplica conforme solicitado
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 2G
      labels:
        - "traefik.enable=true"
        # Explicitamente definindo a rede externa (Variabilizado para proteção)
        - "traefik.docker.network=${TRAEFIK_NETWORK:-ferias_traefik_public}"
        # Acesso do Router API
        - "traefik.http.routers.gestaoferias-api.rule=Host(`${API_DOMAIN:-api.seudominio.com}`)"
        - "traefik.http.routers.gestaoferias-api.entrypoints=websecure"
        # Configuração flexível para Let's Encrypt para aceitar diferentes nomes no servidor host
        - "traefik.http.routers.gestaoferias-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
        # Declaração explicita do apontamento do Servidor
        - "traefik.http.routers.gestaoferias-api.service=gestaoferias-api"
        - "traefik.http.services.gestaoferias-api.loadbalancer.server.port=2000"

  web:
    image: ghcr.io/fontesmidias/gestao-ferias-frontend:latest
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "${PUBLIC_API_URL:?Erro: Defina a URL publica da API}"
    networks:
      - ferias_traefik_public
    deploy:
      replicas: 1 # Ajustado para apenas 1 réplica
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 1G
      labels:
        - "traefik.enable=true"
        # Explicitamente definindo a rede externa
        - "traefik.docker.network=${TRAEFIK_NETWORK:-ferias_traefik_public}"
        # Acesso do Router WEB
        - "traefik.http.routers.gestaoferias-web.rule=Host(`${WEB_DOMAIN:-gestao.seudominio.com}`)"
        - "traefik.http.routers.gestaoferias-web.entrypoints=websecure"
        # Configuração flexível do resolver de TLS
        - "traefik.http.routers.gestaoferias-web.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
        # Declaração explicita do serviço para Traefik evitar timeout local
        - "traefik.http.routers.gestaoferias-web.service=gestaoferias-web"
        - "traefik.http.services.gestaoferias-web.loadbalancer.server.port=3000"

networks:
  ferias_backend_network:
    driver: overlay
    attachable: true
  ferias_traefik_public:
    name: ${TRAEFIK_NETWORK:-ferias_traefik_public}
    external: true

volumes:
  postgres_data_prod:
  redis_data_prod:
