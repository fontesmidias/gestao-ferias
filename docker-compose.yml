version: '3.8'

# ==============================================================================
# AMBIENTE: LOCAL DEVELOPMENT (LABORATÓRIO)
# Finalidade: Desenvolvimento ágil, hot-reload e depuração.
# Como usar: docker-compose up --build
# ==============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: gestaoferias_db_local
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adminpassword}
      POSTGRES_DB: ${DB_NAME:-gestaoferias}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    networks:
      - local_network

  redis:
    image: redis:7-alpine
    container_name: gestaoferias_redis_local
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    networks:
      - local_network

  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: gestaoferias_backend_local
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "development"
      PORT: "3000"
      DATABASE_URL: "postgresql://${DB_USER:-admin}:${DB_PASSWORD:-adminpassword}@postgres:5432/${DB_NAME:-gestaoferias}?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      JWT_SECRET: "${JWT_SECRET:-dev_secret_key_123}"
    depends_on:
      - postgres
      - redis
    networks:
      - local_network

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: gestaoferias_frontend_local
    restart: always
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: "development"
      NEXT_PUBLIC_API_URL: "http://localhost:3000/api/v1"
    depends_on:
      - backend
    networks:
      - local_network

networks:
  local_network:
    driver: bridge

volumes:
  postgres_data_local:
  redis_data_local:
